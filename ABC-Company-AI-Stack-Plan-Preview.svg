  <text x="872" y="418" fill="#163983" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">
    <tspan x="872" dy="0">Lock the core stack</tspan>
    <tspan x="872" dy="24">and prompt library</tspan>
  </text>
  <text x="872" y="468" fill="#567193" font-family="Segoe UI, Arial, sans-serif" font-size="14">
    <tspan x="872" dy="0">Choose the assistant, brand design tool, and clip</tspan>
    <tspan x="872" dy="20">workflow before adding automations.</tspan>
  </text>

  <rect x="840" y="500" width="252" height="154" rx="24" fill="#EEF7F1" stroke="#D8ECD9"/>
  <text x="868" y="536" fill="#4F7854" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">MISTAKES TO AVOID</text>
  <text x="868" y="572" fill="#264F34" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    <tspan x="868" dy="0">Too many content</tspan>
    <tspan x="868" dy="22">tools at once</tspan>
  </text>
  <text x="868" y="620" fill="#50735A" font-family="Segoe UI, Arial, sans-serif" font-size="14">
    <tspan x="868" dy="0">Keep editing and planning tight before</tspan>
    <tspan x="868" dy="20">layering on advanced automations.</tspan>
  </text>

  <rect x="1112" y="500" width="252" height="154" rx="24" fill="#FFF6E8" stroke="#F1DFC1"/>
  <text x="1140" y="536" fill="#8B6C2B" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">UPGRADE PATH</text>
  <text x="1140" y="572" fill="#6B531B" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    <tspan x="1140" dy="0">Add CRM and</tspan>
    <tspan x="1140" dy="22">automation</tspan>
  </text>
  <text x="1140" y="620" fill="#8C743E" font-family="Segoe UI, Arial, sans-serif" font-size="14">
    <tspan x="1140" dy="0">Move recaps and approvals into a lightweight</tspan>
    <tspan x="1140" dy="20">lead and client-delivery system.</tspan>
  </text>

  <rect x="840" y="682" width="524" height="170" rx="24" fill="#F7F8FC" stroke="#E3E7F2"/>
  <text x="872" y="720" fill="#58719A" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">REPORT FOOTER SNAPSHOT</text>
  <text x="872" y="758" fill="#163983" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">Prepared for ABC Company</text>
  <text x="872" y="789" fill="#567193" font-family="Segoe UI, Arial, sans-serif" font-size="16">123 Example Avenue, Seattle, WA 98101</text>
  <text x="872" y="815" fill="#567193" font-family="Segoe UI, Arial, sans-serif" font-size="16">206-555-0142  |  owner@abc-company.example</text>
  <text x="872" y="841" fill="#567193" font-family="Segoe UI, Arial, sans-serif" font-size="16">This report combines the intake answers with EasyAIStack ranking logic.</text>

<svg width="1500" height="980" viewBox="0 0 1500 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="980" fill="#E9EFFB"/>
  <text x="750" y="78" text-anchor="middle" fill="#163983" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">ABC Company AI Stack Plan Preview</text>
  <text x="750" y="116" text-anchor="middle" fill="#4E6694" font-family="Segoe UI, Arial, sans-serif" font-size="18">Two-page PDF-style mockup for the $29 EasyAIStack deliverable</text>

  <rect x="108" y="156" width="580" height="760" rx="30" fill="#FFFFFF" stroke="#C8D6F0" stroke-width="2"/>
  <rect x="812" y="156" width="580" height="760" rx="30" fill="#FFFFFF" stroke="#C8D6F0" stroke-width="2"/>

  <rect x="148" y="196" width="500" height="154" rx="26" fill="#173D8F"/>
  <text x="184" y="244" fill="#C9D7F8" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.2">PREMIUM $29 PLAN</text>
  <text x="184" y="288" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="33" font-weight="700">ABC Company</text>
  <text x="184" y="325" fill="#E1EAFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Business Classification: Agency</text>

  <rect x="148" y="372" width="238" height="104" rx="22" fill="#F4F8FF" stroke="#D6E2F8"/>
  <rect x="408" y="372" width="240" height="104" rx="22" fill="#F4F8FF" stroke="#D6E2F8"/>
  <text x="176" y="405" fill="#58719A" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">MAIN BOTTLENECK</text>
  <text x="176" y="444" fill="#132342" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Content Creation</text>
  <text x="436" y="405" fill="#58719A" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">MONTHLY BUDGET</text>
  <text x="436" y="444" fill="#132342" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">$300 - $1,000</text>

  <text x="148" y="528" fill="#163983" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Starter Stack</text>
  <rect x="148" y="548" width="500" height="156" rx="24" fill="#EFF5FF" stroke="#D7E5FB"/>
  <rect x="176" y="582" width="118" height="34" rx="17" fill="#D9E7FF"/>
  <rect x="308" y="582" width="140" height="34" rx="17" fill="#E8F5EC"/>
  <rect x="462" y="582" width="128" height="34" rx="17" fill="#F6EAF9"/>
  <text x="196" y="604" fill="#173D8F" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">ChatGPT</text>
  <text x="331" y="604" fill="#2A6A4A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Canva</text>
  <text x="486" y="604" fill="#814D8F" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">OpusClip</text>
  <text x="176" y="646" fill="#1F355F" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">
    <tspan x="176" dy="0">Fastest path to better briefs, social assets,</tspan>
    <tspan x="176" dy="24">and client follow-up</tspan>
  </text>
  <text x="176" y="697" fill="#567193" font-family="Segoe UI, Arial, sans-serif" font-size="15">
    <tspan x="176" dy="0">Built for a small agency team that needs faster</tspan>
    <tspan x="176" dy="22">recap-to-content workflows.</tspan>
  </text>

  <text x="148" y="748" fill="#163983" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">First 3 Workflows</text>
  <text x="148" y="784" fill="#173D8F" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">1. Client meeting recap -> content brief -> approval summary</text>
  <text x="148" y="815" fill="#173D8F" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">2. Long video/interview -> LinkedIn clips + captions + thumbnails</text>
  <text x="148" y="846" fill="#173D8F" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">3. Campaign ideas -> branded mockups -> handoff checklist</text>

  <text x="840" y="232" fill="#C9D7F8" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.2">PAGE 2</text>
  <text x="840" y="274" fill="#173D8F" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">30-Day Rollout + Upgrade Path</text>
  <text x="840" y="312" fill="#58719A" font-family="Segoe UI, Arial, sans-serif" font-size="17">
    <tspan x="840" dy="0">What the finished PDF feels like after the cover</tspan>
    <tspan x="840" dy="22">and stack summary.</tspan>
  </text>

  <rect x="840" y="350" width="524" height="130" rx="24" fill="#F4F8FF" stroke="#D6E2F8"/>
